name: Build Android APK (Reproducible)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java (JDK 17) のセットアップ
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'jdkblueprint' # または 'adopt'。F-Droidの環境に合わせるため標準的なものに

      - name: F-Droidと完全に同じ絶対パスの環境を構築
        run: |
          # F-Droidと同じディレクトリ構造を強制的に作成
          sudo mkdir -p /builds/Rino-program/fdroiddata/build/io.github.rinoprogram.audiovisualizer
          # 権限を付与
          sudo chown -R $USER:$USER /builds/
          # 現在のコードを、作成したF-Droid環境のパスへすべて丸写しする（隠しファイル含む）
          cp -a $GITHUB_WORKSPACE/. /builds/Rino-program/fdroiddata/build/io.github.rinoprogram.audiovisualizer/

      - name: 依存関係のインストールと Capacitor 同期
        # 作業ディレクトリを偽装したF-Droid環境に変更
        working-directory: /builds/Rino-program/fdroiddata/build/io.github.rinoprogram.audiovisualizer/android-app
        run: |
          npm ci
          npx --package=@capacitor/cli cap sync

      - name: Gradle でリリースビルドを実行
        working-directory: /builds/Rino-program/fdroiddata/build/io.github.rinoprogram.audiovisualizer/android-app/android
        run: |
          chmod +x gradlew
          # 引数は gradle.properties に移行したため、シンプルに assembleRelease のみでOK
          ./gradlew assembleRelease --no-daemon

      - name: 出来上がった APK を保存（アーティファクト）
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-release-unsigned-apk
          # 偽装環境からAPKを拾い上げる
          path: /builds/Rino-program/fdroiddata/build/io.github.rinoprogram.audiovisualizer/**/*.apk