Description: |
  Audio Visualizer は、端末内の音声/動画ファイルを再生しながら、ビジュアルエフェクトを表示する Android アプリです。

  特徴:
  - ローカルファイルの再生（音声/動画）
  - ビジュアライザー表示と基本的なメディア操作
  - F-Droid 向けにローカル動作を重視（Google サービスや Google Drive 連携は不要）

  プライバシー/権限（要約）:
  - ネットワーク機能は不要（インターネット権限なし）。
  - マイク権限は、任意の「Mic」可視化モードでのみ使用します。
  - メディア読み取り権限は、端末内の音声/動画ファイルを開いて再生するために使用します。
  - フォアグラウンドサービス/スリープ抑止は、バックグラウンド再生の安定性と通知上の再生コントロール表示のために使用します。
